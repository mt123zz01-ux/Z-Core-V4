name: Build Jar From Google Drive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y unzip
          python -m pip install --upgrade pip
          pip install gdown

      - name: Download source from Google Drive
        run: |
          gdown "https://drive.google.com/uc?id=1RUCgVpak7CgRYxlxpLv7Ej40SXRL0lVY" -O source.zip
          file source.zip
          ls -lh source.zip

      - name: Unzip source
        run: |
          unzip source.zip -d source
          ls -la source

      - name: Find project folder
        run: |
          echo "Checking folders..."
          find source -name "gradlew" -type f

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: |
          PROJECT_DIR=$(dirname $(find source -name "gradlew" -type f | head -n 1))
          echo "Project folder: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: source/**/build/libs/*.jar
