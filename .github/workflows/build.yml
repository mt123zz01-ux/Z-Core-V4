name: Build Jar From Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install unzip
        run: sudo apt update && sudo apt install -y unzip

      - name: Download source zip
        run: |
          FILE_ID="1RUCgVpak7CgRYxlxpLv7Ej40SXRL0lVY"
          wget --no-check-certificate "https://drive.google.com/uc?export=download&id=${FILE_ID}" -O source.zip

      - name: Unzip source
        run: unzip source.zip -d source

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: |
          cd source
          chmod +x gradlew
          ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: source/build/libs/*.jar
